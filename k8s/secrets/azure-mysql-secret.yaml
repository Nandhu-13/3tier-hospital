# ============================================================
# Azure Database for MySQL — credentials secret
#
# Easiest way to create (replace values with your Azure MySQL details):
#
#   kubectl create secret generic azure-mysql-secret \
#     --namespace=hospital-system \
#     --from-literal=DB_HOST=your-server.mysql.database.azure.com \
#     --from-literal=DB_USER=hospitaladmin \
#     --from-literal=DB_PASSWORD=YourStrongPassword123! \
#     --from-literal=DB_NAME=hospitaldb
#
# OR fill in the base64 values below:
#   echo -n 'your-value' | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: azure-mysql-secret
  namespace: hospital-system
  labels:
    app: hospital-backend
    database: azure-mysql
type: Opaque
data:
  DB_HOST:     REPLACE_WITH_BASE64_OF_YOUR_AZURE_MYSQL_HOST
  DB_USER:     REPLACE_WITH_BASE64_OF_YOUR_AZURE_MYSQL_USER
  DB_PASSWORD: REPLACE_WITH_BASE64_OF_YOUR_AZURE_MYSQL_PASSWORD
  DB_NAME:     aG9zcGl0YWxkYg==    # hospitaldb
